<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Square dark background -->
  <rect width="64" height="64" rx="8" fill="#0D1925"/>
  <!-- T horizontal bar -->
  <rect x="6" y="8" width="22" height="6" rx="1.5" fill="white"/>
  <!-- T vertical bar -->
  <rect x="13" y="14" width="8" height="18" rx="1.5" fill="white"/>
  <!-- Green chevron double arrow -->
  <polyline points="8,38 15,47 8,56" stroke="#008A5C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="16,38 23,47 16,56" stroke="#008A5C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Top-right accent dots: one filled, two outline -->
  <rect x="32" y="8" width="9" height="9" rx="1.5" fill="#008A5C"/>
  <rect x="43" y="8" width="8" height="8" rx="1.5" stroke="white" stroke-width="1.5" fill="none"/>
  <rect x="32" y="19" width="8" height="8" rx="1.5" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- TDS lettering -->
  <text x="45" y="44" font-family="Arial Black, Arial, sans-serif" font-size="15" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-0.5">TDS</text>
</svg>
