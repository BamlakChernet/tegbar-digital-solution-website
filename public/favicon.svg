<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background square -->
  <rect width="32" height="32" rx="4" fill="#0D1925"/>
  <!-- T letter -->
  <rect x="3" y="4" width="12" height="3" rx="1" fill="white"/>
  <rect x="7" y="7" width="4" height="11" rx="1" fill="white"/>
  <!-- Green chevron -->
  <polyline points="4,22 8,27 4,32" stroke="#008A5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" clip-path="url(#clip)"/>
  <polyline points="8,22 12,27 8,32" stroke="#008A5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" clip-path="url(#clip)"/>
  <clipPath id="clip"><rect width="32" height="32"/></clipPath>
  <!-- Dots top right - one filled green, two outline -->
  <rect x="17" y="4" width="4" height="4" rx="0.8" fill="#008A5C"/>
  <rect x="22.5" y="4" width="3.5" height="3.5" rx="0.8" stroke="white" stroke-width="0.8" fill="none"/>
  <rect x="17" y="9.5" width="3.5" height="3.5" rx="0.8" stroke="white" stroke-width="0.8" fill="none"/>
  <!-- TDS text -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">TDS</text>
</svg>
